<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Store Data</title>
  <style>
    :root {
      --bg1: #0f172a;
      --bg2: #1e293b;
      --card: rgba(255, 255, 255, 0.08);
      --border: rgba(255, 255, 255, 0.14);
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --accent2: #a78bfa;
    }
    h1{
	text-align: center;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(56, 189, 248, 0.20), transparent 30%),
        radial-gradient(circle at bottom right, rgba(167, 139, 250, 0.18), transparent 28%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      padding: 40px 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .hero {
      margin-bottom: 24px;
      padding: 24px 28px;
    }

    .hero h1 {
      margin: 0 0 8px;
      font-size: 2.5rem;
      letter-spacing: -0.03em;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 20px;
    }

    .card {
      border: 1px solid var(--border);
      border-radius: 18px;
      background: var(--card);
      backdrop-filter: blur(14px);
      overflow: hidden;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.22);
    }

    .card-header {
      padding: 20px 20px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(90deg, rgba(56, 189, 248, 0.18), rgba(167, 139, 250, 0.16));
    }

    .card-header h2 {
      margin: 0;
      text-align: center;
      font-size: 1.15rem;
    }

    .card-body {
      padding: 5px 5px 5px;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      color: var(--text);
      font-size: 0.95rem;
    }

    th, td {
      padding: 10px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      text-align: left;
      white-space: nowrap;
    }

    th {
      position: sticky;
      top: 0;
      background: rgba(15, 23, 42, 0.95);
      color: #f8fafc;
      font-weight: 600;
    }

    tr:hover td {
      background: rgba(255, 255, 255, 0.04);
    }

    caption {
      caption-side: top;
      text-align: left;
      margin-bottom: 10px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .table-wrap {
      border-radius: 12px;
      overflow: hidden;
    }
  .GOTEM{padding-bottom: 10px; text-align: center; font-size: 14pt;}
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <h1>Store Data</h1>
    </div>

    <div class="grid">
      <section class="card">
        <div class="card-header">
          <h2>Data Stats</h2>
        </div>
        <div class="card-body">
          <div class="table-wrap">
            {{ info | safe }}
          </div>
        </div>
      </section>

      <section class="card">
        <div class="card-header">
          <h2>Data Types</h2>
        </div>
        <div class="card-body">
          <div class="table-wrap">
            {{ ty | safe }}
          </div>
        </div>
      </section>
      <section class="card">
        <div class="card-header">
 	 <h2>Data Rows</h2>
	</div>
        <div class="card-body">
          <div class="table-wrap">
  	 <p>
    <div class="GOTEM">
 	{{ "{:,}".format(rows) }}
	</div>
  	</p>
	</div>
	</div>
        </section>
      <section class="card">
        <div class="card-header">
         <h2>Data Columns</h2>
        </div>
        <div class="card-body">
          <div class="table-wrap">
         <p>
    <div class="GOTEM">
        {{ "{:,}".format(cols) }}
        </div>
        </p>
        </div>
        </div>
        </section>
    </div>
  </div>
</body>
</html>
